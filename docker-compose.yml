services:
  api:
    build:
      context: .
      target: api
    environment:
      APP_ENV: docker
      DATABASE_URL: sqlite:////app/database/must30.db
      API_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./database:/app/database
      - ./data:/app/data
      - ./outputs:/app/outputs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      target: dashboard
      args:
        VITE_API_URL: http://localhost:8000
        VITE_USE_MOCKS: "false"
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:80"
